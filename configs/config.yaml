project:
  name: news-feed-ranking-system
  random_seed: 42

paths:
  duckdb: data/silver/news_feed.db
  raw_dir: data/raw
  bronze_dir: data/bronze
  silver_dir: data/silver
  gold_dir: data/gold
  logs_dir: data/logs
  model_dir: models_artifacts

ranking:
  candidate_window_days: 7
  max_candidates: 200
  top_k: 20

features:
  use_embeddings: true
  embedding_model: all-MiniLM-L6-v2

api:
  host: 0.0.0.0
  port: 8000

redis:
  host: localhost
  port: 6379
  db: 0
training:
  target: clicked
  test_days: 2
  val_days: 2
  model_name: lightgbm

models:
  logistic_regression:
    enabled: true

  lightgbm:
    enabled: true
    params:
      objective: binary
      learning_rate: 0.05
      n_estimators: 100
      num_leaves: 15
      min_child_samples: 2
      random_state: 42